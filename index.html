<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BFS — Bookmark Favorites System</title>
<style>
/* ============================================================
   CSS Custom Properties — Light & Dark Themes
   ============================================================ */
:root {
  --primary: #4a6fa5;
  --primary-hover: #3b5d8c;
  --accent: #166088;
  --bg: #f5f7fa;
  --bg-secondary: #eef1f5;
  --surface: #ffffff;
  --surface-hover: #f0f3f8;
  --text: #1a1a2e;
  --text-secondary: #5a5a7a;
  --text-muted: #8888a8;
  --border: #dde1e8;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
  --radius: 8px;
  --radius-lg: 12px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --sidebar-width: 220px;
  --progress-height: 32px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  --chat-bg: #f8f9fb;
  --card-pending-bg: #fafafa;
  --success: #2e7d32;
  --warning: #e65100;
  --error: #c62828;
  --info: #1565c0;
}

@media (prefers-color-scheme: dark) {
  :root {
    --primary: #6b9fd4;
    --primary-hover: #80b3e0;
    --accent: #4da8da;
    --bg: #12141a;
    --bg-secondary: #1a1d26;
    --surface: #1e212b;
    --surface-hover: #262a36;
    --text: #e4e4ec;
    --text-secondary: #a0a0b8;
    --text-muted: #686880;
    --border: #2a2d38;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow: 0 4px 12px rgba(0,0,0,0.4);
    --shadow-lg: 0 12px 32px rgba(0,0,0,0.5);
    --chat-bg: #181a22;
    --card-pending-bg: #1a1c24;
  }
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  transition: background var(--transition), color var(--transition);
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  border-radius: var(--radius);
  padding: 8px 16px;
  font-size: 14px;
  transition: all var(--transition);
}

input, textarea {
  font-family: inherit;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 8px 12px;
  font-size: 14px;
  background: var(--surface);
  color: var(--text);
  transition: border-color var(--transition);
}
input:focus, textarea:focus { outline: none; border-color: var(--primary); }

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ============================================================
   App Shell
   ============================================================ */
#app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ---- Sidebar ---- */
#sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: margin-left var(--transition), opacity var(--transition);
  overflow-y: auto;
  z-index: 10;
}
#sidebar.collapsed {
  margin-left: calc(-1 * var(--sidebar-width));
  opacity: 0;
  pointer-events: none;
}

.sidebar-section {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-section h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  transition: all var(--transition);
}
.sidebar-item:hover { background: var(--surface-hover); color: var(--text); }
.sidebar-item.active { background: color-mix(in srgb, var(--primary) 15%, transparent); color: var(--primary); font-weight: 600; }
.sidebar-item .count { margin-left: auto; font-size: 11px; color: var(--text-muted); background: var(--bg-secondary); padding: 1px 6px; border-radius: 10px; }

/* ---- Main Area ---- */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
}

/* ---- Top Bar ---- */
#topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  min-height: 40px;
  flex-wrap: wrap;
}
#toggle-sidebar {
  background: none;
  padding: 4px 8px;
  font-size: 14px;
  color: var(--text-secondary);
  border-radius: 6px;
  flex-shrink: 0;
}
#toggle-sidebar:hover { background: var(--surface-hover); }
#topbar .search-input {
  flex: 1;
  max-width: 300px;
  padding: 5px 8px;
  font-size: 13px;
}
#topbar .topbar-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 12px;
  padding: 5px 10px;
  white-space: nowrap;
  flex-shrink: 0;
}
#topbar .topbar-btn:hover { background: var(--surface-hover); }

/* ---- Content Area (Chat + Cards) ---- */
#content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ---- Chat Panel ---- */
#chat-panel {
  border-bottom: 1px solid var(--border);
  background: var(--chat-bg);
  transition: max-height var(--transition), opacity var(--transition);
  max-height: 320px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#chat-panel.collapsed { max-height: 0; opacity: 0; border-bottom: none; }

#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.chat-msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: var(--radius-lg);
  font-size: 14px;
  line-height: 1.5;
  animation: msgIn 0.2s ease;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.chat-msg.user {
  align-self: flex-end;
  background: var(--primary);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.chat-msg.assistant {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.chat-msg .rec-card {
  display: block;
  margin-top: 6px;
  padding: 8px;
  background: var(--bg-secondary);
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: background var(--transition);
}
.chat-msg .rec-card:hover { background: var(--surface-hover); }
.chat-msg .rec-card .rec-title { font-weight: 600; color: var(--primary); }
.chat-msg .rec-card .rec-reason { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

#chat-input-area {
  display: flex;
  gap: 8px;
  padding: 8px 16px;
  border-top: 1px solid var(--border);
}
#chat-input {
  flex: 1;
  resize: none;
  min-height: 38px;
  max-height: 100px;
}
#chat-send {
  align-self: flex-end;
  background: var(--primary);
  color: #fff;
  padding: 8px 16px;
  font-weight: 600;
}
#chat-send:hover { background: var(--primary-hover); }
#chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

/* ---- Floating Chat Button ---- */
#chat-fab {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  font-size: 24px;
  box-shadow: var(--shadow-lg);
  z-index: 20;
  display: none;
  align-items: center;
  justify-content: center;
  transition: transform var(--transition), box-shadow var(--transition);
}
#chat-fab:hover { transform: scale(1.08); box-shadow: 0 16px 40px rgba(0,0,0,0.2); }
#chat-fab.visible { display: flex; }

/* ---- Card Grid ---- */
#card-grid-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
#card-grid-area.folder-view { /* folder group mode */ }

.folder-group { margin-bottom: 20px; }
.folder-group-header {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
  padding: 8px 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
}
.folder-group-header::before {
  content: "▶";
  font-size: 10px;
  transition: transform var(--transition);
  display: inline-block;
  width: 14px;
}
.folder-group-header.expanded::before { transform: rotate(90deg); }
.folder-group-header .folder-count { font-weight: 400; color: var(--text-muted); font-size: 12px; }

#card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

/* ---- Bookmark Card ---- */
.bookmark-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  transition: all var(--transition);
  position: relative;
  cursor: default;
}
.bookmark-card:hover {
  box-shadow: var(--shadow);
  transform: translateY(-2px);
}
.bookmark-card.pending {
  background: var(--card-pending-bg);
  opacity: 0.7;
}
.bookmark-card .card-title {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.bookmark-card .card-url {
  font-size: 12px;
  color: var(--accent);
  margin-bottom: 8px;
  word-break: break-all;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.bookmark-card .card-summary {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.bookmark-card .card-keywords {
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
  margin-bottom: 8px;
}
.bookmark-card .card-categories {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.bookmark-card .card-category-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: color-mix(in srgb, var(--primary) 12%, transparent);
  color: var(--primary);
  cursor: pointer;
  transition: background var(--transition);
}
.bookmark-card .card-category-tag:hover { background: color-mix(in srgb, var(--primary) 25%, transparent); }
.bookmark-card .card-meta {
  font-size: 11px;
  color: var(--text-muted);
}
.bookmark-card .card-loading {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  color: var(--text-muted);
  font-size: 13px;
}
.bookmark-card .card-loading .dot-pulse {
  display: flex;
  gap: 4px;
}
.bookmark-card .card-loading .dot-pulse span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--primary);
  animation: dotBounce 1.2s infinite ease-in-out;
}
.bookmark-card .card-loading .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
.bookmark-card .card-loading .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ---- Progress Bar ---- */
#progress-bar-area {
  height: var(--progress-height);
  min-height: var(--progress-height);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  font-size: 12px;
  color: var(--text-secondary);
  transition: opacity var(--transition);
}
#progress-bar-area.hidden { opacity: 0; pointer-events: none; }
#progress-track {
  flex: 1;
  height: 6px;
  background: var(--bg-secondary);
  border-radius: 3px;
  overflow: hidden;
}
#progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 3px;
  transition: width 0.4s ease;
}
#progress-text { min-width: 80px; text-align: right; white-space: nowrap; }

/* ---- Welcome / Landing Screen ---- */
#landing {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 20px;
  text-align: center;
  padding: 40px;
}
#landing h1 { font-size: 36px; color: var(--primary); }
#landing p { color: var(--text-secondary); max-width: 480px; line-height: 1.6; }
#landing .btn-primary {
  background: var(--primary);
  color: #fff;
  padding: 12px 28px;
  font-size: 16px;
  font-weight: 600;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  transition: all var(--transition);
}
#landing .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
#landing .btn-secondary {
  background: var(--surface);
  color: var(--text);
  padding: 10px 24px;
  font-size: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
#landing .btn-secondary:hover { background: var(--surface-hover); }

/* ---- Config Panel ---- */
#config-panel {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 360px;
  width: 100%;
}
#config-panel.collapsed { display: none; }
#config-toggle {
  background: none;
  color: var(--text-muted);
  font-size: 13px;
  padding: 4px 8px;
}
#config-toggle:hover { color: var(--text); }
.config-row { display: flex; flex-direction: column; gap: 4px; }
.config-row label { font-size: 12px; color: var(--text-secondary); font-weight: 600; }
.config-row input { width: 100%; }

/* ---- Resume Prompt ---- */
#resume-prompt {
  margin-top: 12px;
  padding: 16px;
  background: var(--bg-secondary);
  border-radius: var(--radius);
  text-align: center;
  max-width: 400px;
  width: 100%;
}
#resume-prompt p { margin-bottom: 10px; font-size: 14px; }
#resume-prompt .btn-row { display: flex; gap: 8px; justify-content: center; }

/* ---- Utility ---- */
.hidden { display: none !important; }
.spinner {
  width: 24px; height: 24px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>
<div id="app" class="hidden">
  <!-- Sidebar -->
  <aside id="sidebar" class="collapsed">
    <div class="sidebar-section">
      <h3>📂 分类</h3>
      <div id="category-list"></div>
    </div>
    <div class="sidebar-section">
      <h3>📁 文件夹</h3>
      <div id="folder-tree"></div>
    </div>
  </aside>

  <!-- Main -->
  <div id="main">
    <!-- Top Bar -->
    <div id="topbar">
      <button id="toggle-sidebar" title="侧栏">☰</button>
      <input type="text" class="search-input" id="card-filter" placeholder="搜索书签..." />
      <span style="font-size:12px;color:var(--text-muted);white-space:nowrap" id="bookmark-count"></span>
      <span id="model-status" title="本地 Embedding 模型状态" style="font-size:11px;display:flex;align-items:center;gap:4px;white-space:nowrap;">
        <span id="model-dot" style="width:8px;height:8px;border-radius:50%;background:var(--text-muted);display:inline-block;"></span>
        <span id="model-label">模型未加载</span>
      </span>
      <span style="flex:1"></span>
      <button id="btn-export-html" class="topbar-btn">📥 导出HTML</button>
      <button id="btn-import-cache" class="topbar-btn">📋 导入缓存</button>
      <button id="btn-export-cache" class="topbar-btn">📤 导出缓存</button>
    </div>

    <!-- Content -->
    <div id="content">
      <!-- Chat Panel -->
      <div id="chat-panel" class="collapsed">
        <div id="chat-messages"></div>
        <div id="chat-input-area">
          <textarea id="chat-input" rows="1" placeholder="输入你的问题，例如：找几个写 Python 测试的工具..."></textarea>
          <button id="chat-send" disabled>发送</button>
          <button id="chat-close" style="background:none;color:var(--text-muted);padding:4px 8px;">✕</button>
        </div>
      </div>

      <!-- Card Grid -->
      <div id="card-grid-area">
        <div id="card-grid"></div>
      </div>

      <!-- Floating Chat Button -->
      <button id="chat-fab" title="打开对话">💬</button>
    </div>

    <!-- Progress Bar -->
    <div id="progress-bar-area" class="hidden">
      <span id="progress-label">处理中</span>
      <div id="progress-track"><div id="progress-fill" style="width:0%"></div></div>
      <span id="progress-text">0/0</span>
    </div>
  </div>
</div>

<!-- Landing Screen -->
<div id="landing">
  <h1>🔖 BFS</h1>
  <p>Bookmark Favorites System — 智能书签管理工具<br>
  自动为书签生成摘要、关键词与分类，用自然语言快速找到所需资源</p>

  <button class="btn-primary" id="btn-import">📂 导入浏览器书签文件</button>
  <p style="font-size:12px;color:var(--text-muted)">支持 Chrome / Edge / Firefox 导出的 HTML 格式</p>

  <button id="config-toggle" style="margin-top:12px;">⚙ API 配置</button>
  <div id="config-panel" class="collapsed">
    <div class="config-row">
      <label>DeepSeek API Key</label>
      <input type="password" id="cfg-deepseek-key" placeholder="sk-..." />
    </div>
    <div class="config-row">
      <label>DeepSeek API URL</label>
      <input type="text" id="cfg-deepseek-url" value="https://api.deepseek.com/v1" />
    </div>
    <div class="config-row">
      <label>OpenAI API Key (可选，用于 embedding)</label>
      <input type="password" id="cfg-openai-key" placeholder="sk-..." />
    </div>
    <div class="config-row">
      <label>OpenAI API URL</label>
      <input type="text" id="cfg-openai-url" value="https://api.openai.com/v1" />
    </div>
    <p style="font-size:12px;color:var(--text-muted);">API Key 仅保留在当前标签页，关闭后自动清除。</p>
    <button class="btn-primary" id="btn-save-config" style="align-self:flex-end;margin-top:4px;">保存配置</button>
  </div>

  <div id="resume-prompt" class="hidden"></div>
</div>

<script>
// ============================================================
// BFS v2 — Main Application
// ============================================================

// ---- Constants ----
const CONCURRENT_LIMIT = 3;
const CLUSTER_TRIGGER_COUNT = 20;
const SEARCH_TOP_K = 20;
const DB_NAME = 'bfs_db';
const DB_VERSION = 1;
const OPFS_CACHE_FILE = 'bfs_cache.json';
const OPFS_PROGRESS_FILE = 'bfs_progress.json';

// ---- DOM Refs ----
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const domApp = $('#app');
const domLanding = $('#landing');
const domSidebar = $('#sidebar');
const domToggleSidebar = $('#toggle-sidebar');
const domCategoryList = $('#category-list');
const domFolderTree = $('#folder-tree');
const domCardFilter = $('#card-filter');
const domBookmarkCount = $('#bookmark-count');
const domCardGrid = $('#card-grid');
const domChatPanel = $('#chat-panel');
const domChatMessages = $('#chat-messages');
const domChatInput = $('#chat-input');
const domChatSend = $('#chat-send');
const domChatClose = $('#chat-close');
const domChatFab = $('#chat-fab');
const domProgressArea = $('#progress-bar-area');
const domProgressFill = $('#progress-fill');
const domProgressText = $('#progress-text');
const domProgressLabel = $('#progress-label');
const domBtnImport = $('#btn-import');
const domConfigToggle = $('#config-toggle');
const domConfigPanel = $('#config-panel');
const domCfgDeepseekKey = $('#cfg-deepseek-key');
const domCfgDeepseekUrl = $('#cfg-deepseek-url');
const domCfgOpenaiKey = $('#cfg-openai-key');
const domCfgOpenaiUrl = $('#cfg-openai-url');
const domBtnSaveConfig = $('#btn-save-config');
const domResumePrompt = $('#resume-prompt');
const domModelDot = $('#model-dot');
const domModelLabel = $('#model-label');

// ---- State ----
let config = {
  deepseekKey: '',
  deepseekUrl: 'https://api.deepseek.com/v1',
  openaiKey: '',
  openaiUrl: 'https://api.openai.com/v1',
};
let bookmarks = [];               // { url, title, addDate, folder, icon }
let bookmarkMap = {};             // url → Bookmark, for O(1) lookup
let cache = { version: 2, lastModified: '', bookmarks: {}, categoryLabels: {} };
let categoryLabels = {};          // cluster_id → label
let folderTree = {};             // folderName → Bookmark[]
let selectedCategory = null;
let selectedFolder = null;
let queueRunning = false;
let bookmarksDirHandle = null;   // FileSystemDirectoryHandle for bookmark file's dir

// ---- Config Persistence (keys are session-only) ----
function loadConfig() {
  try {
    const saved = JSON.parse(localStorage.getItem('bfs_config'));
    const safeConfig = {
      deepseekUrl: saved?.deepseekUrl || config.deepseekUrl,
      openaiUrl: saved?.openaiUrl || config.openaiUrl,
    };
    Object.assign(config, safeConfig);
    const sessionKeys = JSON.parse(sessionStorage.getItem('bfs_session_keys'));
    config.deepseekKey = sessionKeys?.deepseekKey || saved?.deepseekKey || '';

// ---- IndexedDB Helpers (primary store: works from file://, much larger than localStorage) ----
const IDB_CACHE_KEY = 'bfs_cache';
const IDB_PROGRESS_KEY = 'bfs_progress';

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains('state')) db.createObjectStore('state');
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('state', 'readonly');
    const req = tx.objectStore('state').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('state', 'readwrite');
    tx.objectStore('state').put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function idbDelete(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('state', 'readwrite');
    tx.objectStore('state').delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// ---- OPFS Helpers (kept as secondary — only works in secure contexts) ----
async function opfsRead(filename) {
  try {
    const root = await navigator.storage.getDirectory();
    const handle = await root.getFileHandle(filename, { create: false });
    const file = await handle.getFile();
    return JSON.parse(await file.text());
  } catch { return null; }
}

async function opfsWrite(filename, data) {
  try {
    const root = await navigator.storage.getDirectory();
    const handle = await root.getFileHandle(filename, { create: true });
    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
    return true;
  } catch { return false; }
}

// Write cache to both IndexedDB (primary) and OPFS (bonus)
async function persistCache() {
  cache.lastModified = new Date().toISOString();
  cache.categoryLabels = categoryLabels;
  const [idbResult, opfsResult] = await Promise.allSettled([
    idbSet(IDB_CACHE_KEY, cache),
    opfsWrite(OPFS_CACHE_FILE, cache),
  ]);
  const idbSucceeded = idbResult.status === 'fulfilled';
  const opfsSucceeded = opfsResult.status === 'fulfilled' && opfsResult.value === true;
  if (!idbSucceeded && !opfsSucceeded) {
    throw new Error('缓存写入失败：IndexedDB 与 OPFS 均不可用');
  }
}

// Read cache: IDB first, OPFS fallback
async function loadCache() {
  let data = null;
  try { data = await idbGet(IDB_CACHE_KEY); }
  catch(e) { console.warn('IndexedDB cache read failed:', e.message); }
  if (!data) {
    data = await opfsRead(OPFS_CACHE_FILE);
    if (data) {
      try { await idbSet(IDB_CACHE_KEY, data); } catch { /* OPFS remains authoritative */ }
    }
  }
  return data;
}

// ---- Bookmark Parser ----
function parseBookmarkHTML(htmlContent) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(htmlContent, 'text/html');
  const result = [];
  const root = doc.querySelector('DL');
  if (!root) return result;

  const visit = (dl, path) => {
    for (const dt of dl.querySelectorAll(':scope > DT')) {
      const directLink = dt.querySelector(':scope > A');
      if (directLink) {
        const url = directLink.getAttribute('HREF');
        const title = directLink.textContent.trim();
        const addDate = parseInt(directLink.getAttribute('ADD_DATE') || '0') * 1000;
        const icon = directLink.getAttribute('ICON') || '';
        if (url && title) result.push({
          url, title, addDate, folder: path.join(' / ') || '未分类', icon,
        });
      }

      const heading = dt.querySelector(':scope > H3');
      const childDl = dt.querySelector(':scope > DL');
      if (heading && childDl) visit(childDl, [...path, heading.textContent.trim()]);
    }
  };
  visit(root, []);
  return dedupeBookmarks(result);
}

function dedupeBookmarks(items) {
  const seen = new Set();
  return items.filter(item => {
    if (!item?.url || seen.has(item.url)) return false;
    seen.add(item.url);
    return true;
  });
}

    ? `<a class="card-url" href="${escapeAttribute(safeUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(bm.url)}</a>`
    : `<span class="card-url" title="不支持的链接协议">${escapeHtml(bm.url)}</span>`;

  if (isPending) {
    html += `<div class="card-loading">

      html += `<div class="card-keywords">关键词: ${escapeHtml(entry.keywords.join('; '))}</div>`;

      html += '<div class="card-categories">';

        html += `<span class="card-category-tag" data-category="${escapeAttribute(cat)}">${escapeHtml(cat)}</span>`;
      }

  const dateStr = bm.addDate ? new Date(bm.addDate).toLocaleDateString('zh-CN') : '';

// ---- Utils ----
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = String(str ?? '');
  return div.innerHTML;
}

function escapeAttribute(str) {
  return String(str ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function safeExternalUrl(value) {
  try {
    const parsed = new URL(String(value));
    return parsed.protocol === 'http:' || parsed.protocol === 'https:' ? parsed.href : null;
  } catch { return null; }
}

function stableClusterId(urls) {
  let hash = 2166136261;
  for (const char of [...urls].sort().join('\n')) {
    hash ^= char.charCodeAt(0);
    hash = Math.imul(hash, 16777619);
  }
  return `members_${(hash >>> 0).toString(16)}`;
}

function projectVectorForClustering(vector, maxDimensions = 128) {
  if (vector.length <= maxDimensions) return vector;
  const step = vector.length / maxDimensions;
  return Array.from({ length: maxDimensions }, (_, i) => vector[Math.floor(i * step)]);
}

function parseRecommendations(response, allowedUrls) {
  try {
    const text = String(response);
    let parsed = null;
    for (let start = text.indexOf('['); start !== -1; start = text.indexOf('[', start + 1)) {
      let depth = 0, quote = null, escaped = false;
      for (let i = start; i < text.length; i++) {
        const char = text[i];
        if (quote) {
          if (escaped) escaped = false;
          else if (char === '\\') escaped = true;
          else if (char === quote) quote = null;
          continue;
        }
        if (char === '"') { quote = char; continue; }
        if (char === '[') depth++;
        if (char === ']' && --depth === 0) {
          try {
            const candidate = JSON.parse(text.slice(start, i + 1));
            if (Array.isArray(candidate)) parsed = candidate;
          } catch { /* try the next opening bracket */ }
          break;
        }
      }
      if (parsed) break;
    }
    if (!Array.isArray(parsed)) return [];
    return parsed.filter(item =>
      item && typeof item.title === 'string' && typeof item.reason === 'string' &&
      typeof item.url === 'string' && allowedUrls.has(item.url)
    ).slice(0, 5).map(item => ({ title: item.title, reason: item.reason, url: item.url }));
  } catch { return []; }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ---- API Clients ----
function createHttpError(service, status, responseBody = '') {
  let message = `${service} ${status}`;
  if (status === 401) message += '：API Key 无效或已失效，请更新配置';
  else if (status === 403) message += '：当前 API Key 没有访问权限';
  else if (responseBody) message += `: ${responseBody}`;
  const error = new Error(message);
  error.name = 'HttpError';
  error.service = service;
  error.status = status;
  error.responseBody = responseBody;
  return error;
}

function isRetryableError(error) {
  if (!Number.isInteger(error?.status)) return true;
  return error.status === 408 || error.status === 409 || error.status === 425 ||
    error.status === 429 || error.status >= 500;
}

async function callDeepSeek(model, messages, maxTokens = 500) {
  const response = await fetch(`${config.deepseekUrl}/chat/completions`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${config.deepseekKey}`,
    },
    body: JSON.stringify({ model, messages, temperature: 0.7, max_tokens: maxTokens }),
  });
  if (!response.ok) throw createHttpError('DeepSeek', response.status, await response.text());
  const data = await response.json();
  return data.choices?.[0]?.message?.content || '';
}

async function callOpenAIEmbedding(text) {
  const response = await fetch(`${config.openaiUrl}/embeddings`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${config.openaiKey}`,
    },
    body: JSON.stringify({ model: 'text-embedding-3-small', input: text }),
  });
  if (!response.ok) throw createHttpError('OpenAI Embedding', response.status, await response.text());
  const data = await response.json();
  return data.data?.[0]?.embedding || null;
}

// ---- Local Embedding Fallback ----
let localEmbedder = null;
let localEmbedderFailure = null;
let localEmbedderPromise = null;  // serialize concurrent init attempts

function shouldRetryLocalEmbedder(failure, now = Date.now()) {
  return !failure || now >= failure.retryAfter;
}

function updateModelStatus(state, label) {
  if (domModelDot) {
    const colors = { loading: '#e65100', ready: '#2e7d32', failed: '#c62828', none: 'var(--text-muted)' };
    domModelDot.style.background = colors[state] || colors.none;
    domModelLabel.textContent = label;
  }
}

async function initLocalEmbedder() {
  if (localEmbedder) return localEmbedder;
  if (!shouldRetryLocalEmbedder(localEmbedderFailure)) return null;
  if (localEmbedderPromise) return localEmbedderPromise; // wait for in-progress init

  localEmbedderPromise = (async () => {
    updateModelStatus('loading', '加载本地模型...');
    try {
      const mod = await import('./vendor/transformers.min.js');
      mod.env.allowLocalModels = true;
      mod.env.allowRemoteModels = false;
      mod.env.localModelPath = './models/';
      mod.env.backends.onnx.wasm.wasmPaths = './vendor/';
      mod.env.backends.onnx.wasm.numThreads = 1;
      localEmbedder = await mod.pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
      localEmbedderFailure = null;
      updateModelStatus('ready', '模型就绪 (本地 384维)');
      return localEmbedder;
    } catch(e) {
      console.warn('Local embedding model failed to load:', e.message);
      const attempts = (localEmbedderFailure?.attempts || 0) + 1;
      localEmbedderFailure = {
        attempts,
        retryAfter: Date.now() + Math.min(30000, 1000 * 2 ** (attempts - 1)),
        message: e.message,
      };
      updateModelStatus('failed', '模型加载失败，稍后自动重试');
      return null;
    } finally {
      localEmbedderPromise = null;
    }
  })();

  return localEmbedderPromise;
}

async function getLocalEmbedding(text) {
  if (!text) return null;
  text = String(text).trim().substring(0, 512);
  if (!text) return null;

  const embedder = await initLocalEmbedder();
  if (!embedder) return null;

  try {
    const output = await embedder(text, { pooling: 'mean', normalize: true });
    return Array.from(output.data);
  } catch(e) {
    console.warn('Local embedding inference failed:', e.message);
    return null;
  }
}

async function getEmbedding(text) {
  if (!text) return null;
  if (config.openaiKey) {
    try {
      const emb = await callOpenAIEmbedding(text);
      if (emb) updateModelStatus('ready', 'OpenAI (1536维)');
      if (emb) return {
        vector: emb,
        provider: 'openai',
        model: 'text-embedding-3-small',
        dimensions: emb.length,
      };
    }
    catch(e) {
      console.warn('OpenAI embedding failed:', e.message);
      throw e;
    }
  }
  const emb = await getLocalEmbedding(text);
  return emb ? {
    vector: emb,
    provider: 'local',
    model: 'Xenova/all-MiniLM-L6-v2',
    dimensions: emb.length,
  } : null;
}

function inferEmbeddingMeta(entry) {
  if (!entry?.embedding?.length) return null;
  if (entry.embeddingProvider && entry.embeddingModel && entry.embeddingDimensions) {
    return {
      provider: entry.embeddingProvider,
      model: entry.embeddingModel,
      dimensions: entry.embeddingDimensions,
    };
  }
  if (entry.embedding.length === 384) {
    return { provider: 'local', model: 'Xenova/all-MiniLM-L6-v2', dimensions: 384 };
  }
  if (entry.embedding.length === 1536) {
    return { provider: 'openai', model: 'text-embedding-3-small', dimensions: 1536 };
  }
  return null;
}

function embeddingsCompatible(queryMeta, entry) {
  const entryMeta = inferEmbeddingMeta(entry);
  return !!queryMeta && !!entryMeta &&
    queryMeta.provider === entryMeta.provider &&
    queryMeta.model === entryMeta.model &&
    queryMeta.dimensions === entryMeta.dimensions &&
    entry.embedding.length === queryMeta.dimensions;
}

function desiredEmbeddingMeta() {
  return config.openaiKey
    ? { provider: 'openai', model: 'text-embedding-3-small', dimensions: 1536 }
    : { provider: 'local', model: 'Xenova/all-MiniLM-L6-v2', dimensions: 384 };
}

// ---- Summary Generation ----
async function generateSummary(url, title) {
  const prompt = `请为以下网站提供一个简洁的摘要(中文)和关键词:
网站标题: ${title}
网站URL: ${url}

要求:
1. 第一行是用分号分隔的关键词(3-5个)
2. 第二行开始是用1-2句话概括网站的主要内容或功能
3. 保持语言简洁专业
4. 你没有访问网页正文，只能根据标题和 URL 推断；无法判断时明确写“仅凭标题和URL无法确定”，不要编造具体功能

示例:
编程;教程;Python;入门
菜鸟教程是一个提供各种编程语言基础教程的网站，适合初学者快速入门学习。`;

  const fullResponse = await callDeepSeek('deepseek-v4-flash', [{ role: 'user', content: prompt }], 150);
  const lines = fullResponse.split('\n').filter(l => l.trim());
  const keywords = lines[0] ? lines[0].split(';').map(k => k.trim()).filter(Boolean) : [];
  const summary = lines.slice(1).join('\n').trim() || fullResponse;
  return { keywords, summary };
}

// ---- Clustering ----
async function runClustering() {
  const compatibleGroups = new Map();
  const targetMeta = desiredEmbeddingMeta();
  for (const item of Object.entries(cache.bookmarks)) {
    const meta = inferEmbeddingMeta(item[1]);
    if (!meta || !item[1].summary) continue;
    if (!embeddingsCompatible(targetMeta, item[1])) {
      item[1].categories = [];
      continue;
    }
    const key = `${meta.provider}:${meta.model}:${meta.dimensions}`;
    if (!compatibleGroups.has(key)) compatibleGroups.set(key, []);
    compatibleGroups.get(key).push(item);
  }
  const targetKey = `${targetMeta.provider}:${targetMeta.model}:${targetMeta.dimensions}`;
  const entries = compatibleGroups.get(targetKey) || [];
  if (entries.length < CLUSTER_TRIGGER_COUNT) return;

  const vectors = entries.map(([, v]) => projectVectorForClustering(v.embedding));
  const urls = entries.map(([url]) => url);

  // Simple k-means
  const maxK = Math.min(10, Math.floor(entries.length / 5));
  let bestK = 3, bestScore = -Infinity;
  let bestClusters = null;

  for (let k = 3; k <= maxK; k++) {
    const { clusters, score } = kMeans(vectors, k, 10, stableClusterId(urls));
    if (score > bestScore) { bestScore = score; bestK = k; bestClusters = clusters; }
  }

  if (!bestClusters) return;

  // Assign cluster IDs to bookmarks
  const clusterAssignments = {}; // clusterId → [url, ...]
  for (let i = 0; i < urls.length; i++) {
    const cid = `cluster_${bestClusters[i]}`;
    if (!clusterAssignments[cid]) clusterAssignments[cid] = [];
    clusterAssignments[cid].push(urls[i]);
  }

  // Generate labels for new/changed clusters using Pro
  const newLabels = {};
  for (const [cid, clusterUrls] of Object.entries(clusterAssignments)) {
    const stableId = stableClusterId(clusterUrls);
    if (categoryLabels[stableId]) { newLabels[cid] = categoryLabels[stableId]; continue; }
    // Generate label from sample summaries
    const samples = clusterUrls.slice(0, 5).map(u => {
      const e = cache.bookmarks[u];
      return `- ${e.summary?.substring(0, 80)} (关键词: ${e.keywords?.join(',')})`;
    }).join('\n');
    try {
      const label = await callDeepSeek('deepseek-v4-pro', [{
        role: 'user',
        content: `根据以下网站摘要，为这个分类生成一个简短的2-4字中文标签名（如：开发工具、学习资源、AI技术、设计素材等）。只输出标签名，不要其他内容。\n\n${samples}`,
      }], 20);
      newLabels[cid] = label.trim() || `分类${cid}`;
    } catch { newLabels[cid] = `分类${cid}`; }
    categoryLabels[stableId] = newLabels[cid];
  }

  // Update
  for (const [cid, clusterUrls] of Object.entries(clusterAssignments)) {
    for (const url of clusterUrls) {
      if (!cache.bookmarks[url].categories) cache.bookmarks[url].categories = [];
      cache.bookmarks[url].categories = [newLabels[cid]];
    }
  }

  await persistCache();
  renderCategoryList();
}

// k-means implementation
function seededRandom(seed) {
  let state = 2166136261;
  for (const char of String(seed)) {
    state ^= char.charCodeAt(0);
    state = Math.imul(state, 16777619);
  }
  return () => {
    state += 0x6D2B79F5;
    let value = state;
    value = Math.imul(value ^ value >>> 15, value | 1);
    value ^= value + Math.imul(value ^ value >>> 7, value | 61);
    return ((value ^ value >>> 14) >>> 0) / 4294967296;
  };
}

function kMeans(data, k, maxIter = 10, seed = 'bfs') {
  const n = data.length, d = data[0].length;
  const random = seededRandom(seed);
  // Initialize centroids with k-means++
  const centroids = [data[Math.floor(random() * n)]];
  for (let i = 1; i < k; i++) {
    const dists = data.map(p => Math.min(...centroids.map(c => euclideanSq(p, c))));
    const sum = dists.reduce((a, b) => a + b, 0);
    let r = random() * sum, idx = 0;
    for (; idx < n && r > 0; idx++) r -= dists[idx];
    centroids.push(data[Math.min(idx, n - 1)]);
  }

  let clusters = new Array(n).fill(0);
  for (let iter = 0; iter < maxIter; iter++) {
    let changed = false;
    for (let i = 0; i < n; i++) {
      let minDist = Infinity, minIdx = 0;
      for (let j = 0; j < k; j++) {
        const dist = euclideanSq(data[i], centroids[j]);
        if (dist < minDist) { minDist = dist; minIdx = j; }
      }
      if (clusters[i] !== minIdx) { clusters[i] = minIdx; changed = true; }
    }
    if (!changed) break;
    // Recompute centroids
    for (let j = 0; j < k; j++) {
      const members = data.filter((_, i) => clusters[i] === j);
      if (members.length) centroids[j] = members[0].map((_, dim) => members.reduce((s, p) => s + p[dim], 0) / members.length);
    }
  }

  // Silhouette score (simplified)
  let score = 0;
  let scoreCount = 0;
  const grouped = Array.from({ length: k }, () => []);
  for (let i = 0; i < n; i++) grouped[clusters[i]].push(data[i]);
  const sampleStep = Math.max(1, Math.ceil(n / 120));
  for (let i = 0; i < n; i += sampleStep) {
    const a = averageDistToCluster(data[i], grouped[clusters[i]]);
    const b = Math.min(...grouped.map((group, cid) =>
      cid === clusters[i] ? Infinity : averageDistToCluster(data[i], group)
    ));
    score += (b - a) / Math.max(a, b);
    scoreCount++;
  }
  score /= scoreCount;
  return { clusters: [...clusters], score };
}

function euclideanSq(a, b) {
  let sum = 0;
  for (let i = 0; i < a.length; i++) sum += (a[i] - b[i]) ** 2;
  return sum;
}

function averageDistToCluster(point, cluster) {
  if (cluster.length === 0) return Infinity;
  return cluster.reduce((s, p) => s + Math.sqrt(euclideanSq(point, p)), 0) / cluster.length;
}

// ---- Cosine Similarity Search ----
function cosineSimilarity(a, b) {
  let dot = 0, normA = 0, normB = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    normA += a[i] * a[i];
    normB += b[i] * b[i];
  }
  return dot / (Math.sqrt(normA) * Math.sqrt(normB) + 1e-10);
}

function vectorSearch(queryEmbedding, topK = SEARCH_TOP_K) {
  const scored = [];
  for (const [url, entry] of Object.entries(cache.bookmarks)) {
    if (!embeddingsCompatible(queryEmbedding, entry)) continue;
    const sim = cosineSimilarity(queryEmbedding.vector, entry.embedding);
    scored.push({ url, sim, summary: entry.summary, keywords: entry.keywords });
  }
  scored.sort((a, b) => b.sim - a.sim);
  return scored.slice(0, topK);
}

// ---- Background Queue ----
let pendingUrls = [];
let activeCount = 0;
let completedCount = 0;
let totalCount = 0;
let alreadyDoneCount = 0;  // items already processed before queue started
let failedCount = 0;
const inFlightUrls = new Set();
const failedUrls = new Set();
let fatalQueueError = null;

function buildProgressSnapshot(pending, inFlight, failed, counters) {
  return {
    pendingUrls: [...new Set([...pending, ...inFlight, ...failed])],
    completedCount: counters.completedCount,
    totalCount: counters.totalCount,
    alreadyDoneCount: counters.alreadyDoneCount,
    failedCount: counters.failedCount,
  };
}

async function withRetry(operation, maxAttempts = 3, baseDelay = 500) {
  let lastError;
  for (let attempt = 1; attempt <= maxAttempts; attempt++) {
    try { return await operation(); }
    catch (error) {
      lastError = error;
      if (!isRetryableError(error)) break;
      if (attempt < maxAttempts && baseDelay > 0) await sleep(baseDelay * 2 ** (attempt - 1));
    }
  }
  throw lastError;
}

function entryNeedsProcessing(entry) {
  return !entry?.summary || !embeddingsCompatible(desiredEmbeddingMeta(), entry);
}

async function persistProgress() {
  const snapshot = buildProgressSnapshot(pendingUrls, inFlightUrls, failedUrls, {
    completedCount, totalCount, alreadyDoneCount, failedCount,
  });
  const [idbResult, opfsResult] = await Promise.allSettled([
    idbSet(IDB_PROGRESS_KEY, snapshot),
    opfsWrite(OPFS_PROGRESS_FILE, snapshot),
  ]);
  const idbSucceeded = idbResult.status === 'fulfilled';
  const opfsSucceeded = opfsResult.status === 'fulfilled' && opfsResult.value === true;
  if (!idbSucceeded && !opfsSucceeded) throw new Error('进度写入失败：IndexedDB 与 OPFS 均不可用');
}

async function loadProgress() {
  let progress = null;
  try { progress = await idbGet(IDB_PROGRESS_KEY); }
  catch(e) { console.warn('IndexedDB progress read failed:', e.message); }
  if (!progress) {
    progress = await opfsRead(OPFS_PROGRESS_FILE);
    if (progress) {
      try { await idbSet(IDB_PROGRESS_KEY, progress); } catch { /* OPFS remains authoritative */ }
    }
  }
  return progress;
}

// Process a single batch of URLs with concurrent workers
async function processBatch(urls) {
  pendingUrls = [...urls];

  const worker = async () => {
    while (pendingUrls.length > 0 && !fatalQueueError) {
      const url = pendingUrls.shift();
      if (!entryNeedsProcessing(cache.bookmarks[url])) {
        completedCount++;
        updateProgress();
        await persistProgress();
        continue;
      }
      activeCount++;
      inFlightUrls.add(url);
      try {
        const bm = bookmarkMap[url];
        if (!bm) throw new Error('书签不存在于当前导入文件');
        domProgressLabel.textContent = `处理中 (第${completedCount - alreadyDoneCount + 1}个)`;
        const existing = cache.bookmarks[url];
        const content = existing?.summary
          ? { summary: existing.summary, keywords: existing.keywords || [] }
          : await withRetry(() => generateSummary(url, bm.title));
        const embeddingResult = await withRetry(
          () => getEmbedding(`${bm.title} ${content.summary} ${content.keywords.join(' ')}`),
        );
        if (!embeddingResult) throw new Error('Embedding 模型不可用');
        cache.bookmarks[url] = {
          ...existing,
          summary: content.summary,
          keywords: content.keywords,
          summarySource: 'title-url-inference',
          categories: existing?.categories || [],
          embedding: embeddingResult?.vector || null,
          embeddingProvider: embeddingResult.provider,
          embeddingModel: embeddingResult.model,
          embeddingDimensions: embeddingResult.dimensions,
          generatedAt: new Date().toISOString(),
        };
        await persistCache();
        completedCount++;
        updateBookmarkCardUI(url);
      } catch(e) {
        console.error('Generate failed for', url, e.message);
        failedUrls.add(url);
        failedCount++;
        if (e.status === 401 || e.status === 403) fatalQueueError = e;
      } finally {
        inFlightUrls.delete(url);
        activeCount--;
        updateProgress();
        try { await persistProgress(); }
        catch(e) { console.error('Progress save failed:', e.message); }
      }
    }
  };

  const workers = [];
  for (let i = 0; i < CONCURRENT_LIMIT; i++) workers.push(worker());
  await Promise.all(workers);
  return failedUrls.size;
}

async function startBackgroundQueue(urls) {
  if (queueRunning) return;
  queueRunning = true;
  try {
    const uniqueUrls = [...new Set(urls)];
    totalCount = uniqueUrls.length;
    alreadyDoneCount = uniqueUrls.filter(u => !entryNeedsProcessing(cache.bookmarks[u])).length;
    completedCount = alreadyDoneCount;
    failedCount = 0;
    activeCount = 0;
    inFlightUrls.clear();
    failedUrls.clear();
    fatalQueueError = null;

    const unprocessed = uniqueUrls.filter(u => entryNeedsProcessing(cache.bookmarks[u]));
    pendingUrls = [...unprocessed];
    domProgressArea.classList.remove('hidden');
    domProgressLabel.textContent = '处理中';
    updateProgress();
    await persistProgress();
    await processBatch(unprocessed);

    if (fatalQueueError) {
      const isDeepSeek = fatalQueueError.service === 'DeepSeek';
      if (isDeepSeek) {
        config.deepseekKey = '';
        domCfgDeepseekKey.value = '';
      } else {
        config.openaiKey = '';
        domCfgOpenaiKey.value = '';
      }
      sessionStorage.setItem('bfs_session_keys', JSON.stringify({
        deepseekKey: config.deepseekKey,
        openaiKey: config.openaiKey,
      }));
      domProgressLabel.textContent = fatalQueueError.message;
      domLanding.classList.remove('hidden');
      domApp.classList.add('hidden');
      domConfigPanel.classList.remove('collapsed');
      await persistProgress();
    } else if (failedUrls.size === 0) {
      domProgressLabel.textContent = '已完成';
      try { await runClustering(); }
      catch(e) { console.error('Clustering failed:', e.message); }
      renderCategoryList();
      renderFolderTree();
      filterAndRenderCards();
      pendingUrls = [];
      await persistProgress();
      setTimeout(() => { domProgressArea.classList.add('hidden'); }, 4000);
    } else {
      domProgressLabel.textContent = `部分失败（${failedUrls.size}），下次可继续`;
      await persistProgress();
    }
  } catch(e) {
    domProgressLabel.textContent = `任务中断：${e.message}`;
    console.error('Queue failed:', e);
    try { await persistProgress(); } catch { /* original error is more useful */ }
  } finally {
    queueRunning = false;
    updateProgress();
  }
}

function updateProgress() {
  const pct = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;
  domProgressFill.style.width = `${pct}%`;
  domProgressText.textContent = failedCount > 0
    ? `${completedCount}/${totalCount}，失败 ${failedCount}`
    : `${completedCount}/${totalCount}`;
  if (queueRunning || pendingUrls.length > 0) {
    domProgressArea.classList.remove('hidden');
  }
}

async function sendChatMessage() {
  const query = domChatInput.value.trim();
  if (!query || !config.deepseekKey) return;
  domChatInput.value = '';
  domChatSend.disabled = true;
  addChatMessage('user', query);

  try {
    // Vectorize query
    const queryEmbedding = await getEmbedding(query);
    console.log('[Chat] embedding:', queryEmbedding ? `${queryEmbedding.dimensions}维` : 'null');
    if (!queryEmbedding) {
      addChatMessage('assistant', 'Embedding 模型未就绪，请等待模型加载完成（顶部栏绿色圆点）。');
      return;
    }

    // Search
    const topResults = vectorSearch(queryEmbedding);
    console.log('[Chat] 向量检索命中:', topResults.length, 'top1 sim:', topResults[0]?.sim?.toFixed(3));

    if (topResults.length === 0) {
      const hasSummaries = Object.values(cache.bookmarks).filter(e => e.summary).length;
      const hasEmbeddings = Object.values(cache.bookmarks).filter(e => e.embedding).length;
      addChatMessage('assistant', `无可搜索书签。当前状态：${hasSummaries} 个有摘要，${hasEmbeddings} 个有向量。请等待后台处理。`);
      return;
    }

    // Build context for Pro
    const recentContext = chatHistory.slice(-7).map(m => `${m.role}: ${m.content}`).join('\n');
    const topBookmarksText = topResults.map((r, i) =>
      `${i+1}. ${bookmarkMap[r.url]?.title || r.url}\n   URL: ${r.url}\n   摘要: ${r.summary}\n   关键词: ${(r.keywords||[]).join(',')}`
    ).join('\n\n');

    console.log('[Chat] Pro请求中...');
    const response = await callDeepSeek('deepseek-v4-pro', [
      { role: 'system', content: '你是书签推荐助手。只能推荐候选列表中的 URL。仅输出 JSON 数组，不要 Markdown。每项格式：{"title":"标题","reason":"简短理由","url":"候选中的完整URL"}。' },
      { role: 'user', content: `对话历史:\n${recentContext}\n\n用户当前问题: ${query}\n\n可用书签（按相关度排序，共${topResults.length}个）:\n${topBookmarksText}\n\n请推荐3-5个最相关的书签。` },
    ], 600);
    console.log('[Chat] Pro响应:', response.substring(0, 200));

    // Parse recommendations
    const recommendations = parseRecommendations(
      response,
      new Set(topResults.map(result => result.url)),
    );

    if (recommendations.length === 0) {
      console.warn('[Chat] 解析失败，原始响应:', response);
      addChatMessage('assistant', `搜索完成但未能解析推荐结果。原始响应：\n${response.substring(0, 500)}`);
    } else {
      addChatMessage('assistant', '为你找到以下推荐：', recommendations);
    }
  } catch(e) {
    addChatMessage('assistant', `搜索失败: ${e.message}`);
    console.error(e);
  } finally {
    domChatSend.disabled = false;
  }
}

  if (protocolError) {
    domBtnImport.disabled = true;
    domResumePrompt.classList.remove('hidden');
    domResumePrompt.innerHTML = `<p>⚠️ ${escapeHtml(protocolError)}</p>`;
    return;
  }
  await checkResume();

  // If bookmark file path is passed via URL hash or stored, auto-reopen?
  // For now, always show landing until user imports.
}

init();
</script>
</body>
